<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>click target game</title>
</head>

<body>
    <header>
        <h1>Click Target Game</h1>
        <div class="auth-links">
            <a href="register.html" class="btn">S'inscrire</a>
            <a href="login.html" class="btn">Se connecter</a>
            <p id="user-status"></p>
        </div>
    </header>
    <main>
        <section class="hero">
            <h2>Un mini jeu de rapidité</h2>
            <p>Clique sur le plus de cibles possible avant la fin du chrono et essaie de battre ton meilleur score.</p>
            <button id="start-btn" type="button">Commencer</button>
        </section>
        <section class="game">
            <div class="game-info">
                <p>Score : <span id="score">0</span></p>
                <p>Temps : <span id="timer">30</span>s</p>
            </div>

            <div class="game-area">
            </div>
        </section>
        <section class="leaderboard">
            <h2>Classement des meilleurs scores</h2>
            <ul id="leaderboard-list"></ul>
        </section>
        <section class="history">
            <button id="history-btn" type="button">Voir l'historique des scores</button>
            <ul id="score-history"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Click Target Game. Un projet SpringBoot / JavaScript</p>
    </footer>
    <script src="script.js" defer></script>
</body>

</html>
