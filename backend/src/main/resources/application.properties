spring.application.name=click-target-game

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/clicktargetgame}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax